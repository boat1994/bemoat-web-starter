# Starter-only strict CI. Not synced to child projects — see managedPaths in scripts/sync-boilerplate.mjs.
name: CI (starter strict)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  starter-ci:
    if: github.repository == 'boat1994/bemoat-web-starter'
    runs-on: ubuntu-latest
    env:
      PAYLOAD_SECRET: ci-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Repository safety guard
        run: pnpm run guard:safety

      - name: Generate import map
        run: pnpm run generate:importmap

      - name: Generate types
        run: pnpm run generate:types

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Integration tests
        run: pnpm run test:int

      - name: Build
        run: pnpm run build
